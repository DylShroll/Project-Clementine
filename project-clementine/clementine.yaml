target:
  url: "http://<PUBLIC_DNS>"
  scope:
    include_domains:
      # Use the raw EC2 public DNS — no subdomain to worry about
      - "<PUBLIC_DNS>"
    exclude_paths:
      # Avoid DVWA's logout endpoint to keep the session alive during testing
      - "/logout.php"
    rate_limit_rps: 5 # Keep low for a t3.small instance

auth:
  method: "credentials"
  username: "${APP_USERNAME}"
  password: "${APP_PASSWORD}"
  login_url: "http://<PUBLIC_DNS>/login.php"

aws:
  profile: "${AWS_AUDIT_PROFILE}"
  regions:
    - "us-east-2" # adjust if you deployed to a different region
  account_id: "${AWS_ACCOUNT_ID}"

compliance:
  frameworks:
    - "cis_2.0_aws" # CIS baseline — will flag all missing logging controls

reporting:
  formats:
    - "html"
    - "json"
    - "sarif"
    - "markdown"
  output_dir: "./reports/dvwa-test"
  push_to_security_hub: false

orchestrator:
  max_parallel_agents: 2 # Conservative for a single t3.small target
  finding_db: "sqlite:///dvwa-test.db"
  log_level: "INFO"
  pause_between_phases: false

mcp_servers:
  # AutoPentest AI — primary web app scanner (109 OWASP tests, 27 security tools).
  # Setup: git clone https://github.com/bhavsec/autopentest-ai && cd autopentest-ai && make setup
  # Then: export AUTOPENTEST_DIR=/path/to/autopentest-ai
  autopentest:
    command: "uv"
    args: ["--directory", "${AUTOPENTEST_DIR}/server", "run", "server.py"]
    env: {}

  # AWS Well-Architected Security Assessment (AWS Labs official)
  cloud_audit:
    command: "uvx"
    args: ["awslabs.well-architected-security-mcp-server@latest"]
    env:
      AWS_PROFILE: "${AWS_AUDIT_PROFILE}"
      AWS_REGION: "us-east-2"
      FASTMCP_LOG_LEVEL: "ERROR"

  # Prowler scanning runs via CLI (pip install prowler) — no API key needed.
  # Uncomment below only if you have a Prowler Cloud account.
  # prowler:
  #   url: "https://mcp.prowler.com/mcp"
  #   type: "http"
  #   headers:
  #     Authorization: "Bearer ${PROWLER_API_KEY}"

  aws_knowledge:
    url: "https://knowledge-mcp.global.api.aws"
    type: "http"

  aws_docs:
    command: "uvx"
    args: ["awslabs.aws-documentation-mcp-server@latest"]
    env:
      FASTMCP_LOG_LEVEL: "ERROR"
      AWS_DOCUMENTATION_PARTITION: "aws"

  # Official Microsoft Playwright MCP — browser-based testing (DOM XSS, clickjacking).
  playwright:
    command: "npx"
    args: ["-y", "@playwright/mcp@latest"]
    env: {}
