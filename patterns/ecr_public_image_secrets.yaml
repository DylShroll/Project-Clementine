# Pattern: Public ECR image + embedded secrets + no image scanning → account compromise
#
# Container images pushed to a public ECR repository are accessible to any
# AWS account or anonymous user.  If secrets are baked into image layers
# (ENV statements, copied config files, build args cached in layers),
# extracting the image exposes those credentials.  Absent image scanning
# means this exposure is never detected internally.

pattern:
  name: "Public ECR image to embedded secret compromise"
  severity: CRITICAL

entry:
  type: infra_finding
  check: ecr-repository-public

pivot:
  - type: infra_finding
    check: ecr-image-scanning-disabled
    relationship: same_account

  - type: app_finding
    category: information_disclosure
    relationship: same_account

impact: >
  A public ECR repository exposes all image layers to unauthenticated users.
  Secrets baked into image layers — AWS credentials, database passwords, API
  keys — are readable by anyone who pulls the image and inspects its
  filesystem or history.  Because image scanning is disabled, these embedded
  secrets are never flagged.  The disclosed credentials map to an active IAM
  identity, enabling an attacker to access AWS resources, read RDS data,
  or create persistence mechanisms within the account — all without
  compromising any running infrastructure.

remediation_priority:
  - summary: "Make the ECR repository private and audit all image layers for embedded secrets before re-pushing"
    effort: LOW
    breaks_chain: true
    cli_command: |
      # There is no direct 'make private' command — recreate as private repo
      aws ecr create-repository --repository-name <NAME>
      # Delete public repo after migration
      aws ecr-public delete-repository --repository-name <NAME>

  - summary: "Enable ECR enhanced image scanning (Inspector) on all repositories to detect embedded secrets and vulnerabilities"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws ecr put-registry-scanning-configuration \
        --scan-type ENHANCED \
        --rules '[{"repositoryFilters":[{"filter":"*","filterType":"WILDCARD"}],"scanFrequency":"CONTINUOUS_SCAN"}]'

  - summary: "Rotate any credentials found in image history and enforce pre-commit secret scanning in CI/CD pipelines"
    effort: MEDIUM
    breaks_chain: false
