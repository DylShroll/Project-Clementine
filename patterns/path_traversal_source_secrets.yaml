# Pattern: Path traversal → source code / config file read → hardcoded credential discovery
#
# A path traversal vulnerability allows reading arbitrary server-side files.
# Application source code or configuration files frequently contain hardcoded
# credentials.  Those credentials map to active IAM access keys or database
# passwords that have never been rotated, enabling direct API access.

pattern:
  name: "Path traversal to hardcoded credential exfiltration"
  severity: CRITICAL

entry:
  type: app_finding
  category: path_traversal
  wstg: WSTG-INPV-10

pivot:
  - type: infra_finding
    check: iam-access-key-not-rotated
    relationship: same_account

  - type: infra_finding
    check: iam-user-overprivileged
    relationship: same_account

impact: >
  Path traversal allows the attacker to read arbitrary server-side files —
  including application source code, .env files, AWS credential files
  (~/.aws/credentials), and configuration files containing hardcoded secrets.
  The discovered IAM access key has never been rotated and remains active.
  Because the associated IAM user or role is overprivileged, the attacker
  gains direct AWS API access with no further exploitation required — a
  file-read vulnerability converts directly into account compromise.

remediation_priority:
  - summary: "Fix the path traversal — canonicalise file paths and validate against an explicit allowlist of permitted directories"
    effort: MEDIUM
    breaks_chain: true

  - summary: "Rotate all discovered credentials immediately and scan git history and deployment artefacts for other exposures"
    effort: LOW
    breaks_chain: true
    cli_command: |
      # Deactivate exposed key
      aws iam update-access-key \
        --access-key-id <ACCESS_KEY_ID> \
        --status Inactive
      # Generate replacement
      aws iam create-access-key --user-name <USER_NAME>

  - summary: "Remove all hardcoded credentials — migrate to AWS Secrets Manager or IAM roles; run truffleHog/gitleaks on repo history"
    effort: MEDIUM
    breaks_chain: false
