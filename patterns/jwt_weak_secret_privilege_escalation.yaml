# Pattern: JWT weak/absent signature → forged admin token → privilege escalation
#
# A weak or null JWT signing secret lets an attacker forge tokens with arbitrary
# claims (e.g., role=admin).  When the application also has no server-side
# session validation, a forged admin token grants full privileged access.
# Absent rate limiting removes the last barrier to automated token bruteforce.

pattern:
  name: "JWT forgery to privilege escalation"
  severity: CRITICAL

entry:
  type: app_finding
  category: broken_authentication
  wstg: WSTG-ATHN-06

pivot:
  - type: app_finding
    category: jwt_weak_secret
    relationship: same_account

  - type: app_finding
    check: no-server-side-session-invalidation
    relationship: same_account

impact: >
  The application signs JWTs with a weak or well-known secret (or accepts
  the "alg: none" variant).  An attacker can enumerate or brute-force the
  secret offline, then forge a token with elevated claims (role=admin,
  is_superuser=true).  Because there is no server-side session registry, the
  forged token passes all validation checks — granting full privileged access
  without requiring any user credentials.

remediation_priority:
  - summary: "Rotate the JWT signing secret to a cryptographically random 256-bit key and reject 'alg: none' tokens"
    effort: LOW
    breaks_chain: true
    cli_command: |
      # Generate a strong secret
      python3 -c "import secrets; print(secrets.token_hex(32))"
      # Store in Secrets Manager
      aws secretsmanager create-secret --name jwt-signing-key \
        --secret-string "<GENERATED_SECRET>"

  - summary: "Implement server-side token allowlisting or JTI (JWT ID) tracking to enable revocation"
    effort: MEDIUM
    breaks_chain: false

  - summary: "Add rate limiting and alerting on repeated authentication failures to detect brute-force attempts"
    effort: LOW
    breaks_chain: false
