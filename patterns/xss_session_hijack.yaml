# Pattern: XSS → session token theft → admin account takeover
#
# A stored or reflected XSS vulnerability combined with missing HttpOnly
# cookies allows an attacker to steal session tokens via injected JavaScript.
# The absence of Content Security Policy removes the last browser-level
# mitigation, making exploitation reliable across all major browsers.

pattern:
  name: "XSS to admin session theft"
  severity: HIGH

entry:
  type: app_finding
  category: XSS
  wstg: WSTG-INPV-01

pivot:
  - type: app_finding
    check: cookie-missing-httponly
    wstg: WSTG-SESS-02

  - type: app_finding
    check: no-csp-header
    wstg: WSTG-CONF-12

impact: >
  Stored or reflected XSS allows the attacker to inject JavaScript that
  reads document.cookie (possible because HttpOnly is absent) and exfiltrates
  the session token to an attacker-controlled server.  Without a Content
  Security Policy, the browser has no mechanism to block the exfiltration
  request, making exploitation reliable.  If the stolen session belongs to
  an administrator, the attacker gains full application control.

remediation_priority:
  - summary: "Set HttpOnly flag on all session cookies — this single change breaks the attack chain"
    effort: LOW
    breaks_chain: true
    cli_command: |
      # Django example: SESSION_COOKIE_HTTPONLY = True in settings.py
      # Flask example: app.config['SESSION_COOKIE_HTTPONLY'] = True

  - summary: "Implement Content-Security-Policy header to restrict script sources"
    effort: MEDIUM
    breaks_chain: false

  - summary: "Fix the XSS vulnerability — encode all user-controlled output, use template auto-escaping"
    effort: MEDIUM
    breaks_chain: false
