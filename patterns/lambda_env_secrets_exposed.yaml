# Pattern: Lambda overprivileged role + app vuln → env var secret exfil → IAM compromise
#
# Lambda functions commonly store secrets as environment variables.
# An application vulnerability (SSRF, path traversal, or injection) that
# can invoke or read the function's runtime environment exposes those secrets.
# An overprivileged execution role converts the secret into account-level access.

pattern:
  name: "Lambda environment secret to account compromise"
  severity: CRITICAL

entry:
  type: app_finding
  category: information_disclosure
  wstg: WSTG-INFO-05

pivot:
  - type: infra_finding
    check: lambda-environment-secrets-unencrypted
    relationship: same_account

  - type: infra_finding
    check: iam-role-overprivileged
    relationship: same_account

impact: >
  Lambda environment variables are stored in plaintext unless a customer-
  managed KMS key is applied.  An application vulnerability that reaches the
  Lambda runtime (via SSRF to the runtime API, or direct invocation) can read
  those environment variables, including database passwords, API keys, and AWS
  access keys baked in at deploy time.  The overprivileged Lambda execution
  role gives any holder of these credentials broad AWS API access — lateral
  movement, resource creation, or full account compromise.

remediation_priority:
  - summary: "Migrate secrets from Lambda environment variables to AWS Secrets Manager with at-rest encryption"
    effort: MEDIUM
    breaks_chain: true
    cli_command: |
      aws secretsmanager create-secret \
        --name lambda/<FUNCTION_NAME>/db-password \
        --secret-string "<VALUE>"
      # Then update Lambda to fetch at runtime using boto3 get_secret_value

  - summary: "Apply least-privilege to the Lambda execution role — remove unused service permissions"
    effort: MEDIUM
    breaks_chain: false
    cli_command: |
      aws iam put-role-policy \
        --role-name <LAMBDA_ROLE> \
        --policy-name least-privilege \
        --policy-document file://minimal-policy.json

  - summary: "Enable KMS encryption for Lambda environment variables as a defence-in-depth measure"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws lambda update-function-configuration \
        --function-name <FUNCTION_NAME> \
        --kms-key-arn <KMS_KEY_ARN>
