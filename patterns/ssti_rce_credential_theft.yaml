# Pattern: Server-side template injection → RCE → cloud credential theft
#
# SSTI in a Jinja2/Twig/Freemarker template allows OS command execution.
# If the underlying host is an EC2 instance with an attached IAM role,
# environment variables or the IMDS endpoint expose credentials directly.
# Overprivileged roles convert code execution into full account compromise.

pattern:
  name: "SSTI to RCE to cloud credential theft"
  severity: CRITICAL

entry:
  type: app_finding
  category: SSTI
  wstg: WSTG-INPV-18

pivot:
  - type: infra_finding
    check: iam-role-overprivileged
    relationship: same_compute_resource

  - type: infra_finding
    check: ec2-imdsv1-enabled
    relationship: same_compute_resource

impact: >
  Server-side template injection grants remote code execution on the
  application server.  From the server process, the attacker can read
  environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) or
  query the IMDSv1 endpoint at 169.254.169.254 to retrieve temporary IAM
  credentials attached to the instance role.  Because the role is
  overprivileged, those credentials provide broad AWS API access — enabling
  lateral movement, S3 data exfiltration, or further escalation within the
  account.

remediation_priority:
  - summary: "Use a sandboxed template engine in a restricted execution environment — never evaluate user input as a template"
    effort: MEDIUM
    breaks_chain: true

  - summary: "Enforce IMDSv2 on all EC2 instances — requires an X-aws-ec2-metadata-token header, blocking SSRF-based credential theft"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws ec2 modify-instance-metadata-options \
        --instance-id <INSTANCE_ID> \
        --http-tokens required \
        --http-endpoint enabled

  - summary: "Apply least-privilege to the EC2 IAM role — restrict to only the permissions the application requires"
    effort: MEDIUM
    breaks_chain: false
    cli_command: |
      aws iam attach-role-policy \
        --role-name <ROLE_NAME> \
        --policy-arn arn:aws:iam::aws:policy/ReadOnlyAccess
