# Pattern: EKS pod with hostNetwork → IMDSv1 → overprivileged node role
#
# A Kubernetes pod running with hostNetwork:true shares the node's network
# namespace and can therefore reach the EC2 Instance Metadata Service at
# 169.254.169.254.  If IMDSv1 is enabled and the EKS node IAM role is
# overprivileged, an attacker who achieves code execution inside the pod
# (via container escape, misconfigured admission, or supply-chain compromise)
# can steal the node's IAM credentials and escalate to broader AWS access.

pattern:
  name: "EKS hostNetwork pod IMDS credential theft"
  severity: CRITICAL

entry:
  type: infra_finding
  check: eks-pod-hostnetwork-enabled

pivot:
  - type: infra_finding
    check: aws-ec2-imdsv1-enabled
    relationship: same_compute_resource

  - type: infra_finding
    check: eks-node-iam-role-overprivileged
    relationship: same_compute_resource

impact: >
  A pod with hostNetwork:true can reach 169.254.169.254 directly. With IMDSv1
  enabled, it requires no session token to retrieve the node's IAM role
  credentials. If the EKS node IAM role is overprivileged (e.g., has broad
  S3, SSM, or administrative permissions beyond what the kubelet requires),
  the attacker can use those credentials to move laterally across AWS services
  or achieve full account compromise. The CRITICAL rating reflects the three-
  step chain: container code execution → network escape → IAM credential theft.

remediation_priority:
  - summary: "Enforce IMDSv2 on all EKS node groups (breaks the chain — IMDS requires a session token that host-namespace pods cannot obtain via hop-count restriction)"
    effort: LOW
    breaks_chain: true
    cli_command: |
      # Apply IMDSv2-only to an EKS managed node group launch template
      aws ec2 modify-instance-metadata-options \
        --instance-id <NODE_INSTANCE_ID> \
        --http-tokens required \
        --http-put-response-hop-limit 1
    iac_snippet: |
      resource "aws_eks_node_group" "app" {
        launch_template {
          id      = aws_launch_template.eks_node.id
          version = "$Latest"
        }
      }
      resource "aws_launch_template" "eks_node" {
        metadata_options {
          http_tokens                 = "required"
          http_put_response_hop_limit = 1
        }
      }

  - summary: "Deny hostNetwork:true in all namespaces via a Kubernetes admission webhook or OPA/Kyverno policy"
    effort: MEDIUM
    breaks_chain: false
    iac_snippet: |
      # Kyverno ClusterPolicy
      apiVersion: kyverno.io/v1
      kind: ClusterPolicy
      metadata:
        name: disallow-host-network
      spec:
        validationFailureAction: Enforce
        rules:
          - name: deny-host-network
            match:
              resources:
                kinds: [Pod]
            validate:
              message: "hostNetwork is not allowed"
              pattern:
                spec:
                  hostNetwork: "false | ~X"

  - summary: "Apply least-privilege to EKS node IAM roles — restrict to only ECR pull, CloudWatch logs, and VPC CNI permissions"
    effort: MEDIUM
    breaks_chain: false
