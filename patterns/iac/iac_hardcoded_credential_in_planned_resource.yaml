# Pattern: planned IaC carries a hardcoded credential
#
# A pre-deployment scan caught a secret embedded directly in IaC source —
# typically an `aws_secret_access_key`, GitHub PAT, or DB password baked
# into a Terraform variable file or CFN parameter default.
#
# The chain is single-step on purpose: any hardcoded credential in IaC is
# already a CRITICAL finding regardless of what else is in the repo,
# because the secret is now in the version-control history. This pattern
# exists to elevate a single gitleaks/trufflehog finding to a chain in
# the report so it shows up in the "compound" view next to runtime chains.

pattern:
  name: "Hardcoded credential in planned IaC source"
  severity: CRITICAL

entry:
  type: iac_finding
  # No `check` constraint — gitleaks emits one rule per credential type
  # (aws-access-token, github-pat, generic-api-key, …) and any of them
  # qualifies. The `provenance` filter is redundant given `type:
  # iac_finding` but documents intent.
  provenance: iac

impact: >
  A scanner detected a literal secret committed to the IaC repository.
  Once a secret reaches version control it is permanently disclosed —
  rotating the credential is mandatory regardless of whether the
  affected resource is deployed yet. Treat the credential as
  compromised the moment a developer cloned the repo.

remediation_priority:
  - summary: "Rotate the credential out of band immediately"
    effort: LOW
    breaks_chain: true
  - summary: "Move the secret to a managed secret store and reference it at runtime"
    effort: MEDIUM
    breaks_chain: false
    cli_command: |
      # Example for AWS:
      aws secretsmanager create-secret \
        --name <SECRET_NAME> \
        --secret-string "<NEW_VALUE>"
      # Then in your IaC, reference it via data.aws_secretsmanager_secret_version.
  - summary: "Purge the credential from git history"
    effort: HIGH
    breaks_chain: false
