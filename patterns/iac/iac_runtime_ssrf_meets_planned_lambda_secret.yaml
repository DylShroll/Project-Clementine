# Pattern: live runtime SSRF + planned Lambda env-var secret
#
# This is the canonical "would become CRITICAL on deployment" chain
# called out in the Workstream B roadmap: the user is running a live
# pen-test against an existing app while simultaneously planning new
# Lambda functions in IaC, and one of those functions is configured
# with a hardcoded secret in `environment { variables = {...} }`. If a
# live SSRF exists, deploying the planned Lambda turns a routine SSRF
# into a credential-theft vector.
#
# The pattern fires only when *both* sides exist — a live SSRF finding
# from autopentest AND a Phase 0 secret finding. Either alone is its
# own existing pattern; the combination earns a higher severity.

pattern:
  name: "Live SSRF meets planned Lambda env secret (would become CRITICAL on deployment)"
  severity: CRITICAL

entry:
  # Live runtime SSRF (any source, any account/region). The
  # `provenance: live` constraint excludes IaC-only chains so this
  # pattern only fires when the user has actually run the runtime
  # phases.
  type: app_finding
  category: SSRF
  provenance: live

pivot:
  - type: iac_finding
    provenance: iac
    # Match gitleaks/trufflehog on a Lambda resource. The
    # `category` substring lookup matches against the finding's
    # rule_id (which we copy into category at normalisation), so
    # any AWS-key / generic-api-key rule qualifies. The pivot's
    # resource scope is narrowed by inspecting the planned node's
    # type at correlation time via the `same_account` shortcut
    # (which trivially holds inside a single assessment).
    relationship: same_account

impact: >
  An SSRF in the running application can already exfiltrate data from
  internal services it shouldn't be able to reach. The planned Lambda
  function carries a hardcoded credential as an environment variable,
  so the moment that Lambda deploys, the existing SSRF gains a clear
  upgrade path: hit the Lambda runtime API and read the env block.
  This is the textbook "would become CRITICAL on deployment" chain —
  fix either side now and ship safely.

remediation_priority:
  - summary: "Move the planned Lambda secret to AWS Secrets Manager before merging the IaC change"
    effort: MEDIUM
    breaks_chain: true
    iac_snippet: |
      data "aws_secretsmanager_secret_version" "db" {
        secret_id = "lambda/<NAME>/db"
      }
      resource "aws_lambda_function" "this" {
        environment {
          variables = {
            DB_PASSWORD_ARN = data.aws_secretsmanager_secret_version.db.arn
          }
        }
      }
  - summary: "Patch the live SSRF (validate URL allowlist, block link-local 169.254.0.0/16)"
    effort: MEDIUM
    breaks_chain: true
  - summary: "Apply a deny-by-default IMDS lockdown at the VPC layer"
    effort: HIGH
    breaks_chain: false
