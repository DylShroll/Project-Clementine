# Pattern: Public S3 bucket containing unencrypted Terraform state → plaintext secret exfiltration
#
# Terraform stores all resource attributes — including secrets passed as
# variables or computed by providers — in the state file in plaintext.
# Database master passwords, IAM access keys, TLS private keys, and API tokens
# appear verbatim in terraform.tfstate.  When the remote state backend is an S3
# bucket with public access enabled and no server-side encryption, any HTTP
# client can download the state file and extract every secret managed by that
# Terraform workspace — covering the entire infrastructure footprint.
#
# MITRE ATT&CK: T1552.001 (Unsecured Credentials: Credentials In Files),
# T1530 (Data from Cloud Storage Object),
# T1078 (Valid Accounts)

pattern:
  name: "Public S3 Terraform state file to infrastructure-wide secret exfiltration"
  severity: CRITICAL

entry:
  type: infra_finding
  check: s3-bucket-public-access-block-disabled

pivot:
  - type: infra_finding
    check: s3-bucket-no-server-side-encryption
    relationship: same_account

  - type: infra_finding
    check: s3-bucket-no-versioning
    relationship: same_account

impact: >
  The S3 bucket hosting Terraform remote state has public access block disabled
  and no server-side encryption.  The state file is downloadable without AWS
  credentials via a simple HTTP GET to the S3 endpoint.  Terraform state includes
  the plaintext values of every sensitive attribute managed by the workspace:
  RDS master passwords, ElastiCache auth tokens, IAM user access key pairs,
  ACM-imported certificate private keys, and any secret passed via
  sensitive = true variables (stored in plaintext despite the sensitivity marker).
  An attacker downloads the state file, parses the "resources" array, and
  extracts credentials for every system the workspace manages.  Without S3
  versioning, the attacker can also overwrite or delete the state file — rendering
  the Terraform workspace inoperable and masking the breach by destroying the
  evidence of which resources were managed.

remediation_priority:
  - summary: "Enable S3 Block Public Access on the state bucket and add a bucket policy denying any public GetObject"
    effort: LOW
    breaks_chain: true
    cli_command: |
      aws s3api put-public-access-block \
        --bucket <STATE_BUCKET> \
        --public-access-block-configuration \
          BlockPublicAcls=true,IgnorePublicAcls=true,\
          BlockPublicPolicy=true,RestrictPublicBuckets=true
    iac_snippet: |
      resource "aws_s3_bucket_public_access_block" "state" {
        bucket                  = aws_s3_bucket.tf_state.id
        block_public_acls       = true
        block_public_policy     = true
        ignore_public_acls      = true
        restrict_public_buckets = true
      }

  - summary: "Enable SSE-KMS encryption on the state bucket with a customer-managed key — rotate immediately if exposure is confirmed"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws s3api put-bucket-encryption \
        --bucket <STATE_BUCKET> \
        --server-side-encryption-configuration \
          '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms","KMSMasterKeyID":"<KMS_KEY_ARN>"}}]}'

  - summary: "Enable S3 versioning and enable Object Lock or MFA Delete on the state bucket to prevent overwrite/deletion attacks"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws s3api put-bucket-versioning \
        --bucket <STATE_BUCKET> \
        --versioning-configuration Status=Enabled

  - summary: "Rotate all secrets visible in the exposed state file — treat the full Terraform workspace as compromised"
    effort: HIGH
    breaks_chain: false

  - summary: "Migrate plaintext secrets out of Terraform state: reference Secrets Manager or SSM Parameter Store at apply time instead of embedding values"
    effort: HIGH
    breaks_chain: false
    iac_snippet: |
      # Fetch secret at plan/apply time — value not stored in state
      data "aws_secretsmanager_secret_version" "db_pass" {
        secret_id = "prod/db/master-password"
      }
