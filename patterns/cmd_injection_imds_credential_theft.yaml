# Pattern: OS command injection → IMDS credential exfiltration → account compromise
#
# Command injection on an EC2-hosted application lets the attacker run
# arbitrary shell commands in the server process.  A one-liner curl to
# 169.254.169.254 returns IAM credentials when IMDSv1 is active.
# Missing CloudTrail means the subsequent AWS API abuse goes undetected.

pattern:
  name: "Command injection to AWS account compromise"
  severity: CRITICAL

entry:
  type: app_finding
  category: command_injection
  wstg: WSTG-INPV-12

pivot:
  - type: infra_finding
    check: ec2-imdsv1-enabled
    relationship: same_compute_resource

  - type: infra_finding
    check: cloudtrail-not-enabled
    relationship: same_account

impact: >
  OS command injection lets the attacker execute shell commands as the
  application service account.  A simple curl to the IMDSv1 metadata
  endpoint returns the temporary AWS credentials attached to the instance
  role — no authentication required.  Because CloudTrail is disabled, the
  attacker can then use those credentials to enumerate, exfiltrate, or
  modify AWS resources with no audit trail — maximising dwell time and
  the window for data loss.

remediation_priority:
  - summary: "Eliminate OS command injection — use language-native APIs instead of shell execution; validate and allowlist all inputs"
    effort: MEDIUM
    breaks_chain: true

  - summary: "Enforce IMDSv2 to require a session token for IMDS requests — blocks credential theft via shell-level curl"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws ec2 modify-instance-metadata-options \
        --instance-id <INSTANCE_ID> \
        --http-tokens required

  - summary: "Enable CloudTrail in all regions to capture API activity for incident response and forensics"
    effort: LOW
    breaks_chain: false
    cli_command: |
      aws cloudtrail create-trail --name security-audit \
        --s3-bucket-name <BUCKET> --is-multi-region-trail
      aws cloudtrail start-logging --name security-audit
