# Pattern: EKS public API endpoint + overprivileged IRSA → cluster-admin → AWS account takeover
#
# EKS clusters with a publicly reachable API server and no IP allowlist can be
# enumerated and targeted without VPN or network access.  When a Kubernetes
# service account carries an IAM Roles for Service Accounts (IRSA) annotation
# pointing to an overprivileged AWS role, or when a ClusterRoleBinding grants
# cluster-admin to a default or application service account, an attacker who
# gains a foothold in any pod escalates to full cluster control and then to the
# attached AWS IAM role — pivoting from Kubernetes to the entire AWS account.
#
# MITRE ATT&CK: T1613 (Container and Resource Discovery), T1078.004 (Valid Accounts:
# Cloud Accounts), T1548.005 (Temporary Elevated Cloud Access)

pattern:
  name: "EKS public API to AWS account takeover via IRSA"
  severity: CRITICAL

entry:
  type: infra_finding
  check: eks-public-api-endpoint-no-restrict

pivot:
  - type: infra_finding
    check: eks-service-account-irsa-overprivileged
    relationship: same_compute_resource

  - type: infra_finding
    check: eks-rbac-cluster-admin-wildcard
    relationship: same_compute_resource

impact: >
  The EKS API server is reachable from the internet without IP-based restriction.
  An attacker who compromises any pod (via a container vulnerability, misconfigured
  deployment, or injected workload) can query the Kubernetes API to enumerate
  service accounts annotated with eks.amazonaws.com/role-arn.  The IRSA-annotated
  service account token is automatically mounted into pods; by projecting or
  stealing the token the attacker calls sts:AssumeRoleWithWebIdentity and receives
  temporary AWS credentials for the overprivileged role.  A cluster-admin
  ClusterRoleBinding removes all Kubernetes RBAC barriers, allowing arbitrary
  pod creation — including privileged pods that can escape to the underlying EC2
  host and read the instance profile credentials as a second path to AWS access.
  The compound result is full AWS account compromise from any containerised
  application vulnerability.

remediation_priority:
  - summary: "Restrict EKS API server to known CIDR ranges — disable public endpoint or add publicAccessCidrs allowlist"
    effort: LOW
    breaks_chain: true
    cli_command: |
      aws eks update-cluster-config \
        --name <CLUSTER_NAME> \
        --resources-vpc-config \
          endpointPublicAccess=false,endpointPrivateAccess=true
    iac_snippet: |
      resource "aws_eks_cluster" "main" {
        vpc_config {
          endpoint_public_access  = false
          endpoint_private_access = true
        }
      }

  - summary: "Scope IRSA role trust policies to the exact service account namespace and name — remove wildcard sub conditions"
    effort: MEDIUM
    breaks_chain: false
    iac_snippet: |
      {
        "Condition": {
          "StringEquals": {
            "oidc.eks.<REGION>.amazonaws.com/id/<CLUSTER_ID>:sub":
              "system:serviceaccount:<NAMESPACE>:<SA_NAME>",
            "oidc.eks.<REGION>.amazonaws.com/id/<CLUSTER_ID>:aud":
              "sts.amazonaws.com"
          }
        }
      }

  - summary: "Audit ClusterRoleBindings for cluster-admin grants to non-system principals and replace with least-privilege Roles"
    effort: MEDIUM
    breaks_chain: false
    cli_command: |
      kubectl get clusterrolebindings -o json \
        | jq '.items[] | select(.roleRef.name=="cluster-admin") | .subjects'

  - summary: "Apply least-privilege to all IRSA IAM roles — remove iam:*, s3:*, and wildcard resource statements"
    effort: MEDIUM
    breaks_chain: false
