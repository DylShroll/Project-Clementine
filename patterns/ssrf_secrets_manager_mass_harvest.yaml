# Pattern: SSRF → IMDSv1 credentials → Secrets Manager mass harvest → lateral compromise
#
# An SSRF vulnerability on an EC2 instance running IMDSv1 gives the attacker
# temporary IAM credentials.  When those credentials belong to a role that can
# call secretsmanager:ListSecrets and secretsmanager:GetSecretValue on "*",
# every secret in the account — database passwords, third-party API keys,
# internal service tokens, certificate private keys — can be harvested in a
# single automated loop.  This is categorically different from stealing a single
# application secret; it is account-wide credential exfiltration in minutes.
#
# MITRE ATT&CK: T1552.005 (Unsecured Credentials: Cloud Instance Metadata API),
# T1552.001 (Unsecured Credentials: Credentials In Files),
# T1530 (Data from Cloud Storage Object)

pattern:
  name: "SSRF to Secrets Manager mass credential harvest"
  severity: CRITICAL

entry:
  type: app_finding
  category: SSRF
  wstg: WSTG-INPV-09

pivot:
  - type: infra_finding
    check: secretsmanager-secret-no-resource-policy
    relationship: same_account

  - type: infra_finding
    check: iam-role-secretsmanager-wildcard-access
    relationship: same_compute_resource

impact: >
  The SSRF vulnerability allows the attacker to reach the EC2 Instance Metadata
  Service (IMDSv1 requires no session token) and retrieve the temporary IAM
  credentials for the attached instance role.  The role holds
  secretsmanager:GetSecretValue on resource "*" — a common "convenience" pattern
  applied when developers want broad access during development and never scoped
  down before production.  No resource-based policy on the secrets further
  restricts access.  With the retrieved credentials, the attacker calls
  secretsmanager:ListSecrets to enumerate every secret ARN in the account, then
  loops GetSecretValue over the full list.  This exposes database master
  passwords, payment-processor API keys, internal microservice tokens, and any
  other value stored in Secrets Manager — enabling lateral movement to every
  connected system without triggering application-layer authentication checks.

remediation_priority:
  - summary: "Enforce IMDSv2 on all EC2 instances to prevent unauthenticated IMDS queries from SSRF"
    effort: LOW
    breaks_chain: true
    cli_command: |
      aws ec2 modify-instance-metadata-options \
        --instance-id <INSTANCE_ID> \
        --http-tokens required \
        --http-endpoint enabled

  - summary: "Scope Secrets Manager IAM permissions to specific secret ARNs required by each role — remove wildcard resource grants"
    effort: MEDIUM
    breaks_chain: false
    iac_snippet: |
      {
        "Effect": "Allow",
        "Action": ["secretsmanager:GetSecretValue"],
        "Resource": [
          "arn:aws:secretsmanager:<REGION>:<ACCOUNT>:secret:app/<SERVICE>/*"
        ]
      }

  - summary: "Add resource-based policies to high-value secrets restricting access to specific role ARNs and source VPC"
    effort: MEDIUM
    breaks_chain: false
    cli_command: |
      aws secretsmanager put-resource-policy \
        --secret-id <SECRET_ID> \
        --resource-policy file://restrict-policy.json

  - summary: "Fix the SSRF vulnerability — implement strict URL allowlisting for all outbound HTTP requests"
    effort: MEDIUM
    breaks_chain: false

  - summary: "Enable Secrets Manager secret rotation to limit the window of exposure for harvested credentials"
    effort: MEDIUM
    breaks_chain: false
    cli_command: |
      aws secretsmanager rotate-secret \
        --secret-id <SECRET_ID> \
        --rotation-lambda-arn <LAMBDA_ARN> \
        --rotation-rules AutomaticallyAfterDays=30
