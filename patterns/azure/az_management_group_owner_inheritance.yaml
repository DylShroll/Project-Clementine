pattern:
  name: "Azure Management Group Owner Role Inheriting to All Child Subscriptions"
  severity: CRITICAL

entry:
  type: azure_finding
  check: "azure:owner_at_management_group_scope"

pivot:
  - type: azure_finding
    check: "azure:management_group_has_multiple_subscriptions"
    relationship: same_tenant

impact: >
  An Owner role assignment at a Management Group scope automatically inherits to all
  child management groups and subscriptions. A single compromised account with MG-scope
  Owner can control every subscription in the organization — reading all secrets, creating
  VMs, modifying network configurations, and assigning further roles — without any per-
  subscription access grant. This is the highest blast-radius single-account compromise path.

remediation_priority:
  - summary: "Remove Owner from MG scope; use targeted subscription-level assignments or Azure Blueprints for delegation"
    effort: MEDIUM
    breaks_chain: true
  - summary: "Enrol all MG-scope privileged role holders in PIM with approval workflow"
    effort: MEDIUM
    breaks_chain: false
