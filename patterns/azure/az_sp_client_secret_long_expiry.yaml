pattern:
  name: "Azure Service Principal Client Secret with Long Expiry (>1 year)"
  severity: MEDIUM

entry:
  type: azure_finding
  check: "azure:sp_secret_long_expiry"

pivot:
  - type: azure_finding
    check: "azure:sp_has_privileged_api_permission"
    relationship: same_tenant

impact: >
  A service principal has a client secret valid for more than one year (or set to never
  expire). Long-lived secrets persist in CI/CD pipelines, configuration files, and
  developer workstations long after the use-case ends. If the secret is exposed via git
  history, a leaked log, or a misconfigured environment variable, the attacker retains
  access for the full secret lifetime without detection (secrets have no usage audit log
  by default). Combined with privileged API permissions, this provides durable tenant access.

remediation_priority:
  - summary: "Replace long-lived secrets with federated credentials (workload identity) or reduce expiry to 90 days"
    effort: MEDIUM
    breaks_chain: true
  - summary: "Rotate the exposed secret immediately and audit recent sign-in activity for the SP"
    effort: LOW
    breaks_chain: false
