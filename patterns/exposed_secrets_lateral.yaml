# Pattern: Exposed credentials → stale IAM key → lateral movement
#
# Application source code, configuration files, or git history leaks
# AWS credentials.  If those credentials have not been rotated they remain
# valid.  An overprivileged IAM identity attached to the key enables direct
# AWS API access — lateral movement, data exfiltration, or resource abuse.

pattern:
  name: "Secret exposure to lateral movement"
  severity: CRITICAL

entry:
  type: app_finding
  category: information_disclosure

pivot:
  - type: infra_finding
    check: iam-access-key-not-rotated
    relationship: same_account

  - type: infra_finding
    check: iam-user-overprivileged
    relationship: same_account

impact: >
  Credentials leaked from the application (hardcoded in source code, exposed
  .env file, or present in git history) map to an IAM access key that has
  not been rotated and is still active.  The associated IAM user or role
  carries excessive permissions — giving an attacker direct AWS API access
  without needing to exploit additional vulnerabilities.  This is frequently
  the shortest path to full account compromise.

remediation_priority:
  - summary: "Rotate compromised credentials immediately — deactivate and delete the exposed key"
    effort: LOW
    breaks_chain: true
    cli_command: |
      # Deactivate the exposed key
      aws iam update-access-key \
        --access-key-id <ACCESS_KEY_ID> \
        --status Inactive
      # Delete after verifying nothing depends on it
      aws iam delete-access-key --access-key-id <ACCESS_KEY_ID>

  - summary: "Remove hardcoded secrets from application source — use AWS Secrets Manager or Parameter Store"
    effort: MEDIUM
    breaks_chain: false

  - summary: "Enable automatic rotation in AWS Secrets Manager for all long-lived credentials"
    effort: MEDIUM
    breaks_chain: false

  - summary: "Apply least-privilege IAM policy — remove unused permissions from the compromised identity"
    effort: MEDIUM
    breaks_chain: false
