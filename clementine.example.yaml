# Project Clementine — example configuration
#
# Copy this file to clementine.yaml and replace all ${ENV_VAR} placeholders
# with your own environment variable names.  Credentials are never stored
# inline — they are resolved from environment variables at startup.
#
# Usage:
#   export APP_USERNAME=testuser
#   export APP_PASSWORD=testpass
#   export AWS_AUDIT_PROFILE=security-audit
#   clementine run --config clementine.yaml

# ---------------------------------------------------------------------------
# Target application
# ---------------------------------------------------------------------------
target:
  url: "https://app.example.com"
  scope:
    # Only these domains (and their subdomains) will be tested
    include_domains:
      - "app.example.com"
      - "api.example.com"
    # Paths that must never be touched, even if discovered during crawl
    exclude_paths:
      - "/admin/dangerous-action"
      - "/internal/reset-all"
    # Maximum requests per second across all tools (orchestrator-enforced)
    rate_limit_rps: 10

# ---------------------------------------------------------------------------
# Application authentication
# ---------------------------------------------------------------------------
auth:
  method: "credentials"           # credentials | token | cookie | none
  username: "${APP_USERNAME}"
  password: "${APP_PASSWORD}"
  login_url: "https://app.example.com/login"
  # Token-based alternative:
  # method: "token"
  # bearer_token: "${API_TOKEN}"

# ---------------------------------------------------------------------------
# AWS account
# ---------------------------------------------------------------------------
aws:
  profile: "${AWS_AUDIT_PROFILE}"   # AWS CLI profile with SecurityAudit policy
  regions:
    - "us-east-1"
    - "us-west-2"
  account_id: "${AWS_ACCOUNT_ID}"   # 12-digit AWS account ID

# ---------------------------------------------------------------------------
# Azure (Clementine 2.0 "Mandarin") — set enabled: true to activate
# ---------------------------------------------------------------------------
azure:
  enabled: false
  tenants:
    - tenant_id: "${AZURE_TENANT_ID}"
      subscription_ids: []          # empty = all visible subscriptions
      management_group_ids: []
  compliance_frameworks:
    - "cis_3.0_azure"
    - "mcsb_azure"
    - "nist_800_53_revision_5_azure"
    - "iso27001_2013_azure"
    - "soc2_azure"
    - "prowler_threatscore_azure"
  kql_queries_dir: "./queries/azure"
  pim_activation_cost: 0.7          # path-score discount for PIM-eligible edges
  expand_inherited_assignments: true
  guardrails:
    max_resources_per_type: 500
    allow_imds_probe: false         # off by default — requires explicit engagement approval
    allow_anonymous_blob_access_test: true
    allow_kv_secret_metadata_read: true
    allow_sas_token_extraction: true
    allow_run_command_test: false   # never default — too disruptive

# ---------------------------------------------------------------------------
# Compliance frameworks
# ---------------------------------------------------------------------------
compliance:
  frameworks:
    - "cis_2.0_aws"       # CIS AWS Foundations Benchmark v2.0
    - "pci_4.0"           # PCI-DSS v4.0 (add if handling card data)
    - "soc2"              # SOC 2 (add if required by contracts)

# ---------------------------------------------------------------------------
# Reporting
# ---------------------------------------------------------------------------
reporting:
  formats:
    - "html"              # Interactive HTML report
    - "json"              # Machine-readable JSON
    - "sarif"             # For GitHub Code Scanning / IDE consumption
    - "markdown"          # For Git repository integration
  output_dir: "./reports"
  push_to_security_hub: false       # Set true to push findings to AWS Security Hub
  security_hub_region: "us-east-1"

# ---------------------------------------------------------------------------
# Orchestrator tuning
# ---------------------------------------------------------------------------
orchestrator:
  max_parallel_agents: 4
  finding_db: "sqlite:///findings.db"   # or postgres://user:pass@host:5432/db
  log_level: "INFO"
  pause_between_phases: false           # Set true for interactive step-through

# ---------------------------------------------------------------------------
# AI — Amazon Bedrock Claude for finding triage and novel attack-chain discovery
# ---------------------------------------------------------------------------
# Authentication uses the standard AWS credential chain — no Anthropic API key
# is required. The IAM identity running Clementine needs:
#   bedrock:InvokeModel on the primary_model and critical_model ARNs
#   bedrock:InvokeModelWithResponseStream (if streaming is enabled)
#
# If ai.enabled is false, the triage phase is skipped and correlation runs
# rule-based only; Clementine still produces a full report without AI.
#
# Model IDs are Amazon Bedrock cross-region inference profile identifiers.
# Verify that each model is available in your AWS account and region via
# the Bedrock console before running. On-demand throughput model IDs
# (e.g. anthropic.claude-sonnet-4-6-...-v1:0) also work as alternatives.
ai:
  enabled: true
  aws_region: "us-east-1"                              # Bedrock-enabled region
  primary_model: "us.anthropic.claude-sonnet-4-6-20251101"   # Recon, app-test, triage
  critical_model: "us.anthropic.claude-opus-4-7-20251101"    # Phase 4 chain discovery
  effort: "high"                       # Opus-only: low | medium | high | xhigh | max
  max_parallel_requests: 4        # Parallel Bedrock calls across AI phases
  max_retries: 3                  # Transient-error retry budget (throttling, 5xx)

  # Phase 3.5 — per-finding confidence scoring and false-positive flagging.
  triage:
    enabled: true
    batch_size: 10                # Findings per request (balances context + cache)
    false_positive_threshold: 0.35

  # Phase 4 — novel attack-chain discovery on top of the rule-based correlator.
  discovery:
    enabled: true
    max_chains: 10                # Hard cap on accepted AI-proposed chains
    min_confidence: 0.5           # Drop proposals below this confidence

# ---------------------------------------------------------------------------
# MCP server configurations
# ---------------------------------------------------------------------------
mcp_servers:
  # AutoPentest AI — 109 OWASP WSTG tests, 31 PortSwigger technique guides,
  # 68+ MCP tools, 27 pre-installed security tools in Docker.
  # Setup:
  #   git clone https://github.com/bhavsec/autopentest-ai
  #   cd autopentest-ai && make setup
  #   export AUTOPENTEST_DIR=/path/to/autopentest-ai
  autopentest:
    command: "uv"
    args: ["--directory", "${AUTOPENTEST_DIR}/server", "run", "server.py"]
    env: {}

  # AWS Well-Architected Security Assessment MCP Server (AWS Labs official)
  # Assesses AWS environment against the Well-Architected Security Pillar.
  # Requires read-only access to GuardDuty, Security Hub, Inspector, IAM Access Analyzer.
  # No extra setup — uvx installs it automatically.
  cloud_audit:
    command: "uvx"
    args: ["awslabs.well-architected-security-mcp-server@latest"]
    env:
      AWS_PROFILE: "${AWS_AUDIT_PROFILE}"
      AWS_REGION: "us-east-1"
      FASTMCP_LOG_LEVEL: "ERROR"

  # Prowler scanning is free — install the CLI with: pip install prowler
  # The CLI is called directly by phases/aws_audit.py and needs no API key.
  #
  # The Prowler Cloud MCP below is optional and only needed for the managed
  # cloud dashboard / attack-path enrichment features.  Comment it out if you
  # don't have a Prowler Cloud account.
  # prowler:
  #   url: "https://mcp.prowler.com/mcp"
  #   type: "http"
  #   headers:
  #     Authorization: "Bearer ${PROWLER_API_KEY}"

  aws_knowledge:
    url: "https://knowledge-mcp.global.api.aws"
    type: "http"

  aws_docs:
    command: "uvx"
    args: ["awslabs.aws-documentation-mcp-server@latest"]
    env:
      FASTMCP_LOG_LEVEL: "ERROR"
      AWS_DOCUMENTATION_PARTITION: "aws"

  # Official Microsoft Playwright MCP — browser automation for DOM XSS proofs,
  # clickjacking, and JS-rendered authentication testing.
  playwright:
    command: "npx"
    args: ["-y", "@playwright/mcp@latest"]
    env: {}

  # ---------------------------------------------------------------------------
  # Azure MCP servers (Clementine 2.0 — only active when azure.enabled: true)
  # ---------------------------------------------------------------------------

  # Microsoft Azure MCP Server — official read-only Azure resource enumeration.
  # Requires Node.js 20+. Auth: service principal env vars (see §6.3 of spec).
  # All 40+ Azure service namespaces available; Clementine uses namespace mode
  # with --read-only enforced server-side.
  azure_mcp:
    command: "npx"
    args:
      - "-y"
      - "@azure/mcp@latest"
      - "server"
      - "start"
      - "--read-only"
    env:
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      # For AKS workload identity deployments, set this instead of CLIENT_SECRET:
      # AZURE_FEDERATED_TOKEN_FILE: "/var/run/secrets/azure/tokens/azure-identity-token"
      # AZURE_MCP_INCLUDE_PRODUCTION_CREDENTIALS: "true"

  # Prowler Lighthouse AI MCP Server — unified compliance scanning for AWS + Azure.
  # Replaces the old AWS-only Prowler MCP. Runs Azure CIS 3.0, MCSB, NIST 800-53,
  # ISO 27001, SOC 2, and Prowler ThreatScore checks (160+ Azure controls in v5.6+).
  # install: pip install "prowler[azure]>=5.6"
  prowler_mcp:
    command: "python"
    args: ["-m", "prowler.mcp_server"]
    env:
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      AWS_PROFILE: "${AWS_AUDIT_PROFILE}"

  # Microsoft Learn MCP — grounds LLM reasoning in canonical Azure documentation.
  # Thin wrapper over learn.microsoft.com for the AI Triage phase; prevents
  # hallucinated Azure API names and resolves resource-provider semantics.
  microsoft_learn:
    command: "python"
    args: ["-m", "clementine.tools.microsoft_learn_mcp"]
    env: {}
